<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EV Charging Hub Investment Tool</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.js"></script>
  <link rel="stylesheet" href="./assets/styles.css?v=21-5-investor-table-20260719-r1" />
</head>
<body>
  <header class="app-header">
    <div class="header-inner">
      <img class="brand-logo" src="./assets/epower-logo.png" alt="ePower" />
      <div class="hero-copy">
        <h1>EV Charging Hub Investment Tool</h1>
      </div>
    </div>
  </header>

  <div class="view-mode-toggle" id="viewModeToggle">
    <span>View</span>
    <button type="button" data-view-mode="investor">Investor view</button>
    <button type="button" data-view-mode="full" class="active">Full model</button>
  </div>

  <nav class="tabs" id="tabs">
    <div class="tab-group" data-group="assess">
      <span class="tab-group-label">Assess</span>
      <button type="button" data-tab="site" data-audience="investor" data-long="1. Site Screening" data-short="1. Screening" class="active" onclick="window.__evHubGoTab && window.__evHubGoTab('site')">1. Site Screening</button>
      <button type="button" data-tab="demand" data-audience="investor" data-long="2. Demand Forecast" data-short="2. Demand" onclick="window.__evHubGoTab && window.__evHubGoTab('demand')">2. Demand Forecast</button>
    </div>
    <div class="tab-group-divider"></div>
    <div class="tab-group" data-group="design">
      <span class="tab-group-label">Design</span>
      <button type="button" data-tab="setup" data-audience="builder" data-long="3. Product Configuration" data-short="3. Product" onclick="window.__evHubGoTab && window.__evHubGoTab('setup')">3. Product Configuration</button>
      <button type="button" data-tab="scenario" data-audience="builder" data-long="6. Scenario Ranking" data-short="6. Ranking" onclick="window.__evHubGoTab && window.__evHubGoTab('scenario')">6. Scenario Ranking</button>
    </div>
    <div class="tab-group-divider"></div>
    <div class="tab-group" data-group="invest">
      <span class="tab-group-label">Invest</span>
      <button type="button" data-tab="investment" data-audience="investor" data-long="4. Investment Case" data-short="4. Investment" onclick="window.__evHubGoTab && window.__evHubGoTab('investment')">4. Investment Case</button>
      <button type="button" data-tab="annuals" data-audience="investor" data-long="5. Annual Financials" data-short="5. Annuals" onclick="window.__evHubGoTab && window.__evHubGoTab('annuals')">5. Annual Financials</button>
      <button type="button" data-tab="portfolioFinancials" data-audience="investor" data-long="8. Portfolio Financials" data-short="8. Financials" onclick="window.__evHubGoTab && window.__evHubGoTab('portfolioFinancials')">8. Portfolio Financials</button>
      <button type="button" data-tab="report" data-audience="investor" data-long="10. Investor Report" data-short="10. Report" onclick="window.__evHubGoTab && window.__evHubGoTab('report')">10. Investor Report</button>
    </div>
    <div class="tab-group-divider"></div>
    <div class="tab-group" data-group="modelinternals">
      <span class="tab-group-label">Model internals</span>
      <button type="button" data-tab="portfolio" data-audience="builder" data-long="7. Portfolio Calibration" data-short="7. Calibration" onclick="window.__evHubGoTab && window.__evHubGoTab('portfolio')">7. Portfolio Calibration</button>
      <button type="button" data-tab="advanced" data-audience="builder" data-long="9. Advanced Model Settings" data-short="9. Settings" onclick="window.__evHubGoTab && window.__evHubGoTab('advanced')">9. Advanced Model Settings</button>
    </div>
    <button type="button" id="guideButton" class="guide-tab-button" data-long="ⓘ Guide" data-short="ⓘ Guide">ⓘ Guide</button>
  </nav>

  <section class="tabs-progress" id="tabsProgress" aria-label="Workflow progress">
    <span id="tabsProgressText">Step 1 of 10: Site Screening</span>
    <div class="tabs-progress-track"><div class="tabs-progress-fill" id="tabsProgressFill"></div></div>
  </section>

  <main id="app" class="app"></main>

  <script src="./assets/vendor/jszip.min.js?v=3.10.1"></script>
  <script type="module" src="./js/app.js?v=21-5-investor-table-20260719-r1"></script>
</body>
</html>
