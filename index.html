<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EV Charging Hub Investment Tool</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.js"></script>
  <link rel="stylesheet" href="./assets/styles.css?v=21-6-audit-20260719-r1" />
</head>
<body>
  <header class="app-header">
    <div class="header-inner">
      <img class="brand-logo" src="./assets/epower-logo.png" alt="ePower" />
      <div class="hero-copy">
        <h1>EV Charging Hub Investment Tool</h1>
      </div>
    </div>
  </header>

  <nav class="tabs" id="tabs" aria-label="Application navigation">
    <div class="nav-mode-switch" role="group" aria-label="Navigation mode">
      <button type="button" data-nav-mode="investor" class="active">Investor view</button>
      <button type="button" data-nav-mode="analyst">Analyst view</button>
    </div>
    <div class="nav-tab-list">
      <button type="button" data-tab="site" data-audience="investor analyst" data-long="Site Screening" data-short="Screening" class="active">Site Screening</button>
      <button type="button" data-tab="demand" data-audience="investor analyst" data-long="Demand Forecast" data-short="Demand">Demand Forecast</button>
      <button type="button" data-tab="setup" data-audience="investor analyst" data-long="Product Configuration" data-short="Product">Product Configuration</button>
      <button type="button" data-tab="investment" data-audience="investor analyst" data-long="Investment Case" data-short="Investment">Investment Case</button>
      <button type="button" data-tab="portfolioFinancials" data-audience="investor analyst" data-long="Portfolio Financials" data-short="Portfolio">Portfolio Financials</button>
      <button type="button" data-tab="report" data-audience="investor analyst" data-long="Investor Report" data-short="Report">Investor Report</button>
      <button type="button" data-tab="annuals" data-audience="analyst" data-long="Annual Financials" data-short="Annuals">Annual Financials</button>
      <button type="button" data-tab="scenario" data-audience="analyst" data-long="Scenario Ranking" data-short="Ranking">Scenario Ranking</button>
      <button type="button" data-tab="portfolio" data-audience="analyst" data-long="Portfolio Calibration" data-short="Calibration">Portfolio Calibration</button>
      <button type="button" data-tab="advanced" data-audience="analyst" data-long="Advanced Model Settings" data-short="Settings">Advanced Settings</button>
      <button type="button" id="guideButton" class="guide-tab-button" data-long="ⓘ Guide" data-short="ⓘ Guide">ⓘ Guide</button>
    </div>
  </nav>

  <section class="readiness-strip" id="workflowStepper" aria-label="Model readiness">
    <strong id="workflowStatusText">Investor readiness</strong>
    <span data-readiness="site">Site</span>
    <span data-readiness="traffic">AADT</span>
    <span data-readiness="technical">Technical</span>
    <span data-readiness="finance">Finance</span>
    <span data-readiness="report">Report</span>
  </section>

  <main id="app" class="app"></main>

  <script src="./assets/vendor/jszip.min.js?v=3.10.1"></script>
  <script type="module" src="./js/app.js?v=21-6-audit-20260719-r1"></script>
</body>
</html>
