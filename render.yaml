services:
  - type: web
    name: ev-hub-investment-tool-demo
    env: python
    plan: free
    buildCommand: "python -m py_compile server.py"
    startCommand: "python server.py"
    healthCheckPath: /api/health
    envVars:
      - key: DEMO_PASSWORD
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: DEMO_REQUIRE_PASSWORD
        value: "true"
      - key: DISABLE_BROWSER_OPEN
        value: "1"
